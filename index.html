<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dear Gift 3D Sphere</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050505;
            font-family: 'Arial', sans-serif;
            color: #fff;
        }

        /* --- MÀN HÌNH 1: KHÓA TIM HỒNG --- */
        .screen {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 1s ease, transform 1s ease;
            z-index: 1;
        }
        .hidden {
            opacity: 0;
            pointer-events: none;
            transform: scale(0.9);
        }
        
        #screen1 {
            background: radial-gradient(circle, #ff2a85 0%, #3a001c 100%);
            flex-direction: column;
        }
        .heart-btn {
            width: 150px;
            height: 150px;
            background: #ff007f;
            position: relative;
            transform: rotate(-45deg);
            box-shadow: 0 0 30px #ff007f;
            cursor: pointer;
            animation: pulse 1.2s infinite;
        }
        .heart-btn:before, .heart-btn:after {
            content: "";
            width: 150px;
            height: 150px;
            background: #ff007f;
            border-radius: 50%;
            position: absolute;
        }
        .heart-btn:before { top: -75px; left: 0; }
        .heart-btn:after { left: 75px; top: 0; }
        
        @keyframes pulse {
            0% { transform: rotate(-45deg) scale(1); }
            50% { transform: rotate(-45deg) scale(1.1); box-shadow: 0 0 50px #ff007f; }
            100% { transform: rotate(-45deg) scale(1); }
        }
        .hint-text {
            margin-top: 100px;
            font-size: 1.2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 10px #fff;
        }

        /* --- MÀN HÌNH 2: CANVAS HẠT ÁNH SÁNG & CHỮ --- */
        #screen2 canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .text-overlay {
            position: absolute;
            text-align: center;
            font-weight: bold;
            color: #ff3399;
            text-shadow: 0 0 20px #ff3399, 0 0 40px #ff0066;
            font-size: 3.5rem;
            opacity: 0;
            transition: opacity 1.5s ease;
            pointer-events: none;
            width: 80%;
            max-width: 600px;
        }

        /* --- MÀN HÌNH 3: QUẢ CẦU 3D ẢNH UỐN CONG --- */
        #screen3 {
            background: radial-gradient(circle, #1a0010 0%, #000000 100%);
            flex-direction: column;
        }
        .sphere-wrapper {
            width: 100%;
            height: 75%;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Tạo chiều sâu perspective lớn hơn để thấy rõ độ cong vòng cung */
            perspective: 1200px; 
        }
        .sphere-container {
            width: 0px;
            height: 0px;
            position: relative;
            transform-style: preserve-3d;
            animation: rotateSphere 25s infinite linear;
        }
        .img-card {
            position: absolute;
            width: 85px;
            height: 115px;
            left: -42px;
            top: -57px;
            border: 1.5px solid rgba(255, 51, 153, 0.6);
            border-radius: 6px;
            overflow: hidden;
            box-shadow: 0 0 15px rgba(255, 51, 153, 0.4);
            background: #111;
            /* Đảm bảo ảnh uốn cong mềm mại */
            transform-origin: center center; 
            backface-visibility: visible;
        }
        .img-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        @keyframes rotateSphere {
            0% { transform: rotateX(6deg) rotateY(0deg); }
            100% { transform: rotateX(6deg) rotateY(360deg); }
        }
        .next-btn {
            position: absolute;
            bottom: 40px;
            padding: 12px 35px;
            background: transparent;
            border: 2px solid #ff3399;
            color: #ff3399;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            box-shadow: 0 0 15px rgba(255, 51, 153, 0.3);
            transition: 0.3s;
            z-index: 10;
        }
        .next-btn:hover {
            background: #ff3399;
            color: #fff;
            box-shadow: 0 0 25px #ff3399;
        }

        /* --- MÀN HÌNH 4: BỨC THƯ TỎ TÌNH --- */
        #screen4 {
            background: #000;
        }
        .letter-box {
            background: rgba(20, 20, 20, 0.9);
            border: 1px solid #ff3399;
            padding: 40px;
            border-radius: 15px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 0 30px rgba(255, 51, 153, 0.2);
            text-align: center;
            position: relative;
        }
        .letter-box h2 {
            color: #ff3399;
            margin-bottom: 10px;
            font-size: 1.6rem;
        }
        .letter-box p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #e0e0e0;
            margin-top: 15px;
            white-space: pre-line;
        }
        .decor-heart {
            position: absolute;
            color: #ff3399;
            font-size: 1.5rem;
            animation: float 3s infinite ease-in-out;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>

    <div class="screen" id="screen1">
        <div class="heart-btn" onclick="startGift()"></div>
        <div class="hint-text">Chạm vào đây đi</div>
    </div>

    <div class="screen hidden" id="screen2">
        <canvas id="particleCanvas"></canvas>
        <div class="text-overlay" id="textOverlay">Ngày Quốc Tế Thiếu Nhi</div>
    </div>

    <div class="screen hidden" id="screen3">
        <div class="sphere-wrapper">
            <div class="sphere-container" id="sphere">
                <div class="img-card"><img src="anh1.jpg" alt="love"></div>
                <div class="img-card"><img src="anh2.jpg" alt="love"></div>
                <div class="img-card"><img src="anh3.jpg" alt="love"></div>
                <div class="img-card"><img src="anh4.jpg" alt="love"></div>
                <div class="img-card"><img src="anh5.jpg" alt="love"></div>
                <div class="img-card"><img src="anh6.jpg" alt="love"></div>
                <div class="img-card"><img src="anh7.jpg" alt="love"></div>
                <div class="img-card"><img src="anh8.jpg" alt="love"></div>
                <div class="img-card"><img src="anh1.jpg" alt="love"></div>
                <div class="img-card"><img src="anh2.jpg" alt="love"></div>
                <div class="img-card"><img src="anh3.jpg" alt="love"></div>
                <div class="img-card"><img src="anh4.jpg" alt="love"></div>
                <div class="img-card"><img src="anh5.jpg" alt="love"></div>
                <div class="img-card"><img src="anh6.jpg" alt="love"></div>
                <div class="img-card"><img src="anh7.jpg" alt="love"></div>
                <div class="img-card"><img src="anh8.jpg" alt="love"></div>
            </div>
        </div>
        <button class="next-btn" onclick="goToLetter()">Bấm vào đây tiếp nè</button>
    </div>

    <div class="screen hidden" id="screen4">
        <div class="letter-box">
            <span class="decor-heart" style="top: 15px; left: 20px;">🦋</span>
            <span class="decor-heart" style="top: 15px; right: 20px;">🦋</span>
            <h2>Hôm nay: 01-06-2026</h2>
            <h3 style="color: #ff3399; font-weight: normal;">Là ngày "Quốc tế thiếu nhi"</h3>
            <p id="typingText"></p>
        </div>
    </div>

    <script>
        function startGift() {
            document.getElementById('screen1').classList.add('hidden');
            document.getElementById('screen2').classList.remove('hidden');
            initParticles();
        }

        function goToSphere() {
            document.getElementById('screen2').classList.add('hidden');
            document.getElementById('screen3').classList.remove('hidden');
            buildSphere();
        }

        function goToLetter() {
            document.getElementById('screen3').classList.add('hidden');
            document.getElementById('screen4').classList.remove('hidden');
            startTyping();
        }

        /* --- XỬ LÝ CANVAS HẠT ÁNH SÁNG --- */
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function initParticles() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            for (let i = 0; i < 350; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    originX: canvas.width / 2 + (Math.random() - 0.5) * 150,
                    originY: canvas.height / 2 + (Math.random() - 0.5) * 150,
                    size: Math.random() * 2.5 + 0.5,
                    color: `hsl(${Math.random() * 40 + 320}, 100%, 65%)`,
                    speedX: (Math.random() - 0.5) * 1.5,
                    speedY: (Math.random() - 0.5) * 1.5,
                    gathering: false
                });
            }
            animateParticles();

            setTimeout(() => {
                particles.forEach(p => p.gathering = true);
            }, 2500);

            setTimeout(() => {
                document.getElementById('textOverlay').style.opacity = '1';
            }, 4000);

            setTimeout(() => {
                goToSphere();
            }, 7500);
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            particles.forEach(p => {
                if (!p.gathering) {
                    p.x += p.speedX;
                    p.y += p.speedY;
                    if (p.x < 0 || p.x > canvas.width) p.speedX *= -1;
                    if (p.y < 0 || p.y > canvas.height) p.speedY *= -1;
                } else {
                    p.x += (p.originX - p.x) * 0.05;
                    p.y += (p.originY - p.y) * 0.05;
                }

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = p.color;
                ctx.fill();
            });
            
            requestAnimationFrame(animateParticles);
        }

        /* --- THUẬT TOÁN TOÁN HỌC PHÂN BỔ ẢNH THEO HÌNH CẦU CONG TRÒN --- */
        function buildSphere() {
            const cards = document.querySelectorAll('.img-card');
            const total = cards.length;
            const radius = 180; // Độ rộng vòng cung hình cầu
            
            cards.forEach((card, index) => {
                // Phân bổ đều góc theo trục dọc và ngang bằng công thức Fibonacci Sphere
                const phi = Math.acos(-1 + (2 * index) / total);
                const theta = Math.sqrt(total * Math.PI) * phi;
                
                // Chuyển đổi sang hệ độ (degrees) cho CSS
                const rotateYDeg = theta * (180 / Math.PI);
                const rotateXDeg = (phi * (180 / Math.PI)) - 90;
                
                // ĐẶC BIỆT: rotateY -> rotateX -> translateZ giúp bẻ cong hướng ảnh ôm trọn vào bề mặt tâm cầu
                card.style.transform = `rotateY(${rotateYDeg}deg) rotateX(${-rotateXDeg}deg) translateZ(${radius}px)`;
            });
        }

        /* --- HIỆU ỨNG GÕ CHỮ --- */
        const contentMessage = `Chúc bạn nhỏ của tui mau ăn chóng lớn và ngoan ngoãn nhé. Luôn vui vẻ, nở nụ cười trên môi và đặc biệt là không được tiêu cực ạ.\n\nChúc bạn nhỏ ngày càng xinh xắn, dễ thương, mong bạn có tất cả cả vũ trụ va vào.\n\nThương bạn nhỏ của tui nhiều lắm... ❤️`;
        let textIndex = 0;

        function startTyping() {
            const typingElement = document.getElementById('typingText');
            if (textIndex < contentMessage.length) {
                typingElement.innerHTML += contentMessage.charAt(textIndex);
                textIndex++;
                setTimeout(startTyping, 50);
            }
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
