<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quà Tặng Quả Cầu 3D Hoàn Chỉnh</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #020202;
            font-family: 'Arial', sans-serif;
            color: #fff;
        }

        /* --- MÀN HÌNH CHUNG --- */
        .screen {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 1s ease, transform 1s ease;
            z-index: 1;
        }
        .hidden {
            opacity: 0;
            pointer-events: none;
            transform: scale(0.92);
        }
        
        /* MÀN HÌNH 1: KHÓA TRÁI TIM */
        #screen1 {
            background: radial-gradient(circle, #ff2a85 0%, #2b0014 100%);
            flex-direction: column;
        }
        .heart-btn {
            width: 140px;
            height: 140px;
            background: #ff007f;
            position: relative;
            transform: rotate(-45deg);
            box-shadow: 0 0 35px #ff007f;
            cursor: pointer;
            animation: pulse 1.2s infinite;
        }
        .heart-btn:before, .heart-btn:after {
            content: "";
            width: 140px;
            height: 140px;
            background: #ff007f;
            border-radius: 50%;
            position: absolute;
        }
        .heart-btn:before { top: -70px; left: 0; }
        .heart-btn:after { left: 70px; top: 0; }
        
        @keyframes pulse {
            0% { transform: rotate(-45deg) scale(1); }
            50% { transform: rotate(-45deg) scale(1.08); box-shadow: 0 0 55px #ff007f; }
            100% { transform: rotate(-45deg) scale(1); }
        }
        .hint-text {
            margin-top: 90px;
            font-size: 1.1rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-shadow: 0 0 10px #fff;
        }

        /* MÀN HÌNH 2: CANVAS CHỮ VÀ HẠT SÁNG */
        #screen2 canvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
        }
        .text-overlay {
            position: absolute;
            text-align: center;
            font-weight: bold;
            color: #ff3399;
            text-shadow: 0 0 25px #ff3399, 0 0 45px #ff0066;
            font-size: 3.2rem;
            opacity: 0;
            transition: opacity 1.2s ease;
            pointer-events: none;
            width: 85%;
        }

        /* MÀN HÌNH 3: QUẢ CẦU 3D CHỨA NHIỀU ẢNH */
        #screen3 {
            background: #050505;
            flex-direction: column;
            overflow: hidden;
        }
        #sphereContainer 3d {
            width: 100%;
            height: 80%;
            position: relative;
        }
        .next-btn {
            position: absolute;
            bottom: 40px;
            padding: 12px 40px;
            background: transparent;
            border: 2px solid #ff3399;
            color: #ff3399;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            box-shadow: 0 0 15px rgba(255, 51, 153, 0.3);
            transition: 0.3s ease;
            z-index: 100;
        }
        .next-btn:hover {
            background: #ff3399;
            color: #fff;
            box-shadow: 0 0 30px #ff3399;
        }

        /* MÀN HÌNH 4: BỨC THƯ TỰ ĐỘNG GÕ CHỮ */
        #screen4 { background: #000; }
        .letter-box {
            background: rgba(15, 15, 15, 0.95);
            border: 1px solid #ff3399;
            padding: 35px;
            border-radius: 15px;
            max-width: 480px;
            width: 90%;
            box-shadow: 0 0 35px rgba(255, 51, 153, 0.25);
            text-align: center;
        }
        .letter-box h2 { color: #ff3399; margin-bottom: 8px; font-size: 1.5rem; }
        .letter-box p {
            font-size: 1.05rem;
            line-height: 1.6;
            color: #dddddd;
            margin-top: 15px;
            white-space: pre-line;
            text-align: left;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/renderers/CSS3DRenderer.js"></script>
</head>
<body>

    <div class="screen" id="screen1">
        <div class="heart-btn" onclick="startGift()"></div>
        <div class="hint-text">Chạm vào đây đi</div>
    </div>

    <div class="screen hidden" id="screen2">
        <canvas id="particleCanvas"></canvas>
        <div class="text-overlay" id="textOverlay">Ngày Quốc Tế Thiếu Nhi</div>
    </div>

    <div class="screen hidden" id="screen3">
        <div id="sphereContainer3d" style="width: 100%; height: 80%;"></div>
        <button class="next-btn" onclick="goToLetter()">Bấm vào đây tiếp nè</button>
    </div>

    <div class="screen hidden" id="screen4">
        <div class="letter-box">
            <h2>Hôm nay: 01-06-2026</h2>
            <h3 style="color: #ff3399; font-weight: normal; font-size: 1.1rem;">Là ngày "Quốc tế thiếu nhi"</h3>
            <p id="typingText"></p>
        </div>
    </div>

    <script>
        // Danh sách các bức ảnh bạn đã upload lên kho lưu trữ GitHub
        const imageSources = [
            'anh1.jpg', 'anh2.jpg', 'anh3.jpg', 'anh4.jpg',
            'anh5.jpg', 'anh6.jpg', 'anh7.jpg', 'anh8.jpg'
        ];

        function startGift() {
            document.getElementById('screen1').classList.add('hidden');
            document.getElementById('screen2').classList.remove('hidden');
            initParticles();
        }

        function goToSphere() {
            document.getElementById('screen2').classList.add('hidden');
            document.getElementById('screen3').classList.remove('hidden');
            init3DSphere();
        }

        function goToLetter() {
            document.getElementById('screen3').classList.add('hidden');
            document.getElementById('screen4').classList.remove('hidden');
            startTyping();
        }

        /* --- MÀN HÌNH 2: CANVAS HẠT ÁNH SÁNG --- */
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function initParticles() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            for (let i = 0; i < 300; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    originX: canvas.width / 2 + (Math.random() - 0.5) * 160,
                    originY: canvas.height / 2 + (Math.random() - 0.5) * 160,
                    size: Math.random() * 2 + 0.6,
                    color: `hsl(${Math.random() * 40 + 320}, 100%, 65%)`,
                    speedX: (Math.random() - 0.5) * 2,
                    speedY: (Math.random() - 0.5) * 2,
                    gathering: false
                });
            }
            animateParticles();
            setTimeout(() => particles.forEach(p => p.gathering = true), 2200);
            setTimeout(() => document.getElementById('textOverlay').style.opacity = '1', 3500);
            setTimeout(goToSphere, 7000);
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                if (!p.gathering) {
                    p.x += p.speedX; p.y += p.speedY;
                    if (p.x < 0 || p.x > canvas.width) p.speedX *= -1;
                    if (p.y < 0 || p.y > canvas.height) p.speedY *= -1;
                } else {
                    p.x += (p.originX - p.x) * 0.06;
                    p.y += (p.originY - p.y) * 0.06;
                }
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.fill();
            });
            requestAnimationFrame(animateParticles);
        }

        /* --- MÀN HÌNH 3: THUẬT TOÁN DỰNG QUẢ CẦU 3D THẬT SỰ (THREE.JS) --- */
        function init3DSphere() {
            const container = document.getElementById('sphereContainer3d');
            
            // Thiết lập không gian 3D, camera phối cảnh thấu kính lồi
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(50, container.clientWidth / container.clientHeight, 1, 2000);
            camera.position.z = 850;

            // Bộ dựng hình CSS 3D chuyên dụng cho việc uốn mặt phẳng HTML
            const renderer = new THREE.CSS3DRenderer();
            renderer.setSize(container.clientWidth, container.clientHeight);
            container.appendChild(renderer.domElement);

            // Nhóm đối tượng chứa tập hợp toàn bộ ảnh bên trong cấu trúc cầu
            const sphereGroup = new THREE.Group();
            scene.add(sphereGroup);

            // Tạo danh sách lặp nhiều phần tử ảnh để lấp đầy bề mặt quả cầu (khoảng 28 tấm ảnh xoay vòng)
            const totalCards = 28;
            const radius = 260; // Khoảng cách bán kính từ tâm lõi ra bề mặt cầu

            for (let i = 0; i < totalCards; i++) {
                // Phân bổ các điểm tọa độ đều bao bọc hình cầu bằng thuật toán chuỗi xoắn góc phân vị
                const phi = Math.acos(-1 + (2 * i) / totalCards);
                const theta = Math.sqrt(totalCards * Math.PI) * phi;

                // Tạo thẻ Div chứa cấu trúc ảnh phẳng bên trong
                const cardDiv = document.createElement('div');
                cardDiv.style.width = '120px';
                cardDiv.style.height = '155px';
                cardDiv.style.boxShadow = '0 0 15px rgba(255, 51, 153, 0.6)';
                cardDiv.style.border = '2px solid rgba(255, 51, 153, 0.8)';
                cardDiv.style.borderRadius = '10px'; // Bo tròn các góc của viền ảnh mảnh ghép
                cardDiv.style.overflow = 'hidden';
                cardDiv.style.backgroundColor = '#000';

                const img = document.createElement('img');
                img.src = imageSources[i % imageSources.length];
                img.style.width = '100%';
                img.style.height = '100%';
                img.style.objectFit = 'cover';
                cardDiv.appendChild(img);

                // Chuyển đổi thẻ HTML thành đối tượng 3D trong không gian Three.js
                const object3D = new THREE.CSS3DObject(cardDiv);
                
                // Tính toán vị trí điểm đứng dựa trên phân rã góc cầu hình tròn
                object3D.position.x = radius * Math.sin(phi) * Math.sin(theta);
                object3D.position.y = radius * Math.cos(phi);
                object3D.position.z = radius * Math.sin(phi) * Math.cos(theta);

                // Điều chỉnh hướng xoay của từng tấm ảnh quay mặt hướng tâm lồi ra ngoài tạo vòm ôm quả cầu
                const targetVector = new THREE.Vector3(object3D.position.x * 2, object3D.position.y * 2, object3D.position.z * 2);
                object3D.lookAt(targetVector);

                sphereGroup.add(object3D);
            }

            // Vòng lặp vẽ lại liên tục để tạo chuyển động xoay quả cầu tự động quanh các trục không gian
            function animate() {
                requestAnimationFrame(animate);
                sphereGroup.rotation.y += 0.006;  // Tốc độ xoay ngang tự động theo trục Y
                sphereGroup.rotation.x = 0.15;    // Nghiêng nhẹ trục X của khối cầu lên phía trước
                renderer.render(scene, camera);
            }
            animate();

            // Xử lý co giãn tự động khi thay đổi kích thước màn hình thiết bị (Responsive)
            window.addEventListener('resize', onWindowResize, false);
            function onWindowResize() {
                camera.aspect = container.clientWidth / container.clientHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(container.clientWidth, container.clientHeight);
            }
        }

        /* --- MÀN HÌNH 4: HIỆU ỨNG GÕ CHỮ --- */
        const contentMessage = `Chúc bạn nhỏ của tui mau ăn chóng lớn và ngoan ngoãn nhé. Luôn vui vẻ, nở nụ cười trên môi và đặc biệt là không được tiêu cực ạ.\n\nChúc bạn nhỏ ngày càng xinh xắn, dễ thương, mong bạn có tất cả cả vũ trụ va vào.\n\nThương bạn nhỏ của tui nhiều lắm... ❤️`;
        let textIndex = 0;

        function startTyping() {
            const typingElement = document.getElementById('typingText');
            if (textIndex < contentMessage.length) {
                typingElement.innerHTML += contentMessage.charAt(textIndex);
                textIndex++;
                setTimeout(startTyping, 45);
            }
        }
    </script>
</body>
</html>
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
