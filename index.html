<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dear Gift - Sphere Glass 3D</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050505;
            font-family: 'Arial', sans-serif;
            color: #fff;
            user-select: none;
        }

        /* --- MÀN HÌNH CHUNG --- */
        .screen {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 1s ease, transform 1s ease;
            z-index: 1;
        }
        .hidden {
            opacity: 0;
            pointer-events: none;
            transform: scale(0.9);
        }
        
        /* --- MÀN HÌNH 1: KHÓA TIM HỒNG --- */
        #screen1 {
            background: radial-gradient(circle, #ff2a85 0%, #3a001c 100%);
            flex-direction: column;
        }
        .heart-btn {
            width: 150px;
            height: 150px;
            background: #ff007f;
            position: relative;
            transform: rotate(-45deg);
            box-shadow: 0 0 30px #ff007f;
            cursor: pointer;
            animation: pulse 1.2s infinite;
        }
        .heart-btn:before, .heart-btn:after {
            content: "";
            width: 150px;
            height: 150px;
            background: #ff007f;
            border-radius: 50%;
            position: absolute;
        }
        .heart-btn:before { top: -75px; left: 0; }
        .heart-btn:after { left: 75px; top: 0; }
        
        @keyframes pulse {
            0% { transform: rotate(-45deg) scale(1); }
            50% { transform: rotate(-45deg) scale(1.1); box-shadow: 0 0 50px #ff007f; }
            100% { transform: rotate(-45deg) scale(1); }
        }
        .hint-text {
            margin-top: 100px;
            font-size: 1.2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 10px #fff;
        }

        /* --- MÀN HÌNH 2: CANVAS HẠT ÁNH SÁNG & CHỮ --- */
        #screen2 canvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
        }
        .text-overlay {
            position: absolute;
            text-align: center;
            font-weight: bold;
            color: #ff3399;
            text-shadow: 0 0 20px #ff3399, 0 0 40px #ff0066;
            font-size: 3.5rem;
            opacity: 0;
            transition: opacity 1.5s ease;
            pointer-events: none;
            width: 80%;
            max-width: 600px;
        }

        /* --- MÀN HÌNH 3: QUẢ CẦU GLASS 3D XOAY VUỐT TỰ DO --- */
        #screen3 {
            background: radial-gradient(circle, #1a0010 0%, #000000 100%);
            flex-direction: column;
            perspective: 1200px; /* Góc nhìn 3D có chiều sâu */
        }
        .sphere-wrapper {
            width: 100%;
            height: 75%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        /* Khung quả cầu */
        .sphere {
            width: 350px;
            height: 350px;
            position: relative;
            transform-style: preserve-3d;
        }
        /* Định dạng các tấm ảnh trong cầu */
        .sphere img {
            position: absolute;
            width: 90px;
            height: 90px;
            border-radius: 12px;
            object-fit: cover;
            /* Căn giữa chuẩn xác vào tâm hệ tọa độ quả cầu */
            left: 50%;
            top: 50%;
            margin-left: -45px;
            margin-top: -45px;
            transform-origin: center;
            box-shadow: 0 0 15px rgba(255, 51, 153, 0.4);
            border: 1px solid rgba(255, 51, 153, 0.6);
            pointer-events: none;
        }
        /* Lớp kính thủy tinh bao bọc lồi ra ngoài */
        .glass {
            position: absolute;
            width: 350px;
            height: 350px;
            border-radius: 50%;
            backdrop-filter: blur(4px) brightness(1.1);
            background: rgba(255, 255, 255, 0.03);
            box-shadow:
                inset 0 0 40px rgba(255, 255, 255, 0.2),
                0 0 60px rgba(255, 51, 153, 0.1);
            pointer-events: none; /* Cho phép vuốt xuyên qua lớp kính vào ảnh */
        }
        .next-btn {
            position: absolute;
            bottom: 45px;
            padding: 12px 35px;
            background: transparent;
            border: 2px solid #ff3399;
            color: #ff3399;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            box-shadow: 0 0 15px rgba(255, 51, 153, 0.3);
            transition: 0.3s;
            z-index: 10;
        }
        .next-btn:hover {
            background: #ff3399;
            color: #fff;
            box-shadow: 0 0 25px #ff3399;
        }

        /* --- MÀN HÌNH 4: BỨC THƯ TỎ TÌNH --- */
        #screen4 {
            background: #000;
        }
        .letter-box {
            background: rgba(20, 20, 20, 0.95);
            border: 1px solid #ff3399;
            padding: 40px;
            border-radius: 15px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 0 30px rgba(255, 51, 153, 0.2);
            text-align: center;
            position: relative;
        }
        .letter-box h2 {
            color: #ff3399;
            margin-bottom: 10px;
            font-size: 1.6rem;
        }
        .letter-box p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #e0e0e0;
            margin-top: 15px;
            white-space: pre-line;
            text-align: left;
        }
        .decor-heart {
            position: absolute;
            color: #ff3399;
            font-size: 1.5rem;
            animation: float 3s infinite ease-in-out;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>

    <div class="screen" id="screen1">
        <div class="heart-btn" onclick="startGift()"></div>
        <div class="hint-text">Chạm vào đây đi</div>
    </div>

    <div class="screen hidden" id="screen2">
        <canvas id="particleCanvas"></canvas>
        <div class="text-overlay" id="textOverlay">Ngày Quốc Tế Thiếu Nhi</div>
    </div>

    <div class="screen hidden" id="screen3">
        <div class="sphere-wrapper">
            <div class="sphere" id="sphere"></div>
            <div class="glass"></div>
        </div>
        <button class="next-btn" onclick="goToLetter()">Bấm vào đây tiếp nè</button>
    </div>

    <div class="screen hidden" id="screen4">
        <div class="letter-box">
            <span class="decor-heart" style="top: 15px; left: 20px;">🦋</span>
            <span class="decor-heart" style="top: 15px; right: 20px;">🦋</span>
            <h2>Hôm nay: 01-06-2026</h2>
            <h3 style="color: #ff3399; font-weight: normal;">Là ngày "Quốc tế thiếu nhi"</h3>
            <p id="typingText"></p>
        </div>
    </div>

    <script>
        // Mảng chứa danh sách 8 ảnh thực tế của bạn trên Github
        const baseImages = [
            'anh1.jpg', 'anh2.jpg', 'anh3.jpg', 'anh4.jpg',
            'anh5.jpg', 'anh6.jpg', 'anh7.jpg', 'anh8.jpg'
        ];

        // Tự động lặp lại mảng ảnh để đạt tổng số 25 tấm ảnh lấp đầy khối cầu
        const images = [];
        for (let i = 0; i < 25; i++) {
            images.push(baseImages[i % baseImages.length]);
        }

        const sphere = document.getElementById("sphere");
        const radius = 145; // Bán kính phân bổ ảnh
        const total = images.length;

        // Trạng thái điều hướng xoay cầu
        let rotX = 0, rotY = 0;
        let vX = 0, vY = 0; // Vận tốc quán tính tự động quay
        let dragging = false;
        let lastX, lastY;

        function startGift() {
            document.getElementById('screen1').classList.add('hidden');
            document.getElementById('screen2').classList.remove('hidden');
            initParticles();
        }

        function goToSphere() {
            document.getElementById('screen2').classList.add('hidden');
            document.getElementById('screen3').classList.remove('hidden');
            buildSphere();
        }

        function goToLetter() {
            document.getElementById('screen3').classList.add('hidden');
            document.getElementById('screen4').classList.remove('hidden');
            startTyping();
        }

        /* --- TẠO VÀ PHÂN BỔ ẢNH LÊN MẶT CẦU --- */
        function buildSphere() {
            images.forEach((src, i) => {
                const img = document.createElement("img");
                img.src = src;

                // Thuật toán ma trận phân bổ hình cầu Fibonacci đều đặn
                const phi = Math.acos(-1 + (2 * i) / total);
                const theta = Math.sqrt(total * Math.PI) * phi;

                const x = radius * Math.cos(theta) * Math.sin(phi);
                const y = radius * Math.sin(theta) * Math.sin(phi);
                const z = radius * Math.cos(phi);

                // Lưu tọa độ gốc vào thuộc tính dữ liệu
                img.dataset.x = x;
                img.dataset.y = y;
                img.dataset.z = z;

                sphere.appendChild(img);
            });
            
            // Đặt vận tốc xoay mặc định ban đầu giúp quả cầu tự chuyển động nhẹ trước khi vuốt
            vY = 0.4;
            animateSphere();
        }

        /* --- XỬ LÝ SỰ KIỆN VUỐT XOAY (CHUỘT & MÀN HÌNH CẢM ỨNG) --- */
        // Sự kiện chuột (PC)
        document.addEventListener("mousedown", e => {
            if(document.getElementById('screen3').classList.contains('hidden')) return;
            dragging = true;
            lastX = e.clientX;
            lastY = e.clientY;
        });
        document.addEventListener("mouseup", () => dragging = false);
        document.addEventListener("mousemove", e => {
            if (!dragging) return;
            let dx = e.clientX - lastX;
            let dy = e.clientY - lastY;
            vY = dx * 0.15;
            vX = dy * 0.15;
            lastX = e.clientX;
            lastY = e.clientY;
        });

        // Sự kiện cảm ứng (Điện thoại Mobile)
        document.addEventListener("touchstart", e => {
            if(document.getElementById('screen3').classList.contains('hidden')) return;
            dragging = true;
            lastX = e.touches[0].clientX;
            lastY = e.touches[0].clientY;
        });
        document.addEventListener("touchend", () => dragging = false);
        document.addEventListener("touchmove", e => {
            if (!dragging) return;
            let dx = e.touches[0].clientX - lastX;
            let dy = e.touches[0].clientY - lastY;
            vY = dx * 0.15;
            vX = dy * 0.15;
            lastX = e.touches[0].clientX;
            lastY = e.touches[0].clientY;
        });

        /* --- ĐỘNG HỌA QUẢ CẦU XOAY VÀ SCALE CHIỀU SÂU --- */
        function animateSphere() {
            rotX += vX;
            rotY += vY;

            // Giảm dần vận tốc (Hiệu ứng quán tính mượt mà)
            if (!dragging) {
                vX *= 0.95;
                vY *= 0.95;
                // Duy trì chuyển động xoay ngang tự động siêu nhẹ khi không chạm
                rotY += 0.05; 
            } else {
                vX *= 0.85;
                vY *= 0.85;
            }

            const imgs = sphere.children;

            for (let img of imgs) {
                let x = img.dataset.x;
                let y = img.dataset.y;
                let z = img.dataset.z;

                // Chuỗi xoay và đẩy 3D theo góc quay hiện tại
                let transform = `rotateX(${rotX}deg) rotateY(${rotY}deg) translate3d(${x}px, ${y}px, ${z}px)`;

                // Tính toán tỷ lệ phóng to thu nhỏ căn cứ theo chiều sâu trục Z
                let scale = (parseFloat(z) + radius) / (2 * radius);
                transform += ` scale(${0.55 + scale * 0.9})`;

                img.style.transform = transform;

                // Điều chỉnh độ sáng tối dựa trên vị trí trước/sau quả cầu
                img.style.filter = `brightness(${0.5 + scale * 0.7})`;
                
                // Điều chỉnh thứ tự hiển thị layer (ảnh phía trước đè lên ảnh phía sau)
                img.style.zIndex = Math.round(parseFloat(z) + radius);
            }

            requestAnimationFrame(animateSphere);
        }

        /* --- XỬ LÝ CANVAS HẠT ÁNH SÁNG MÀN HÌNH 2 --- */
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function initParticles() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            for (let i = 0; i < 350; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    originX: canvas.width / 2 + (Math.random() - 0.5) * 150,
                    originY: canvas.height / 2 + (Math.random() - 0.5) * 150,
                    size: Math.random() * 2.5 + 0.5,
                    color: `hsl(${Math.random() * 40 + 320}, 100%, 65%)`,
                    speedX: (Math.random() - 0.5) * 1.5,
                    speedY: (Math.random() - 0.5) * 1.5,
                    gathering: false
                });
            }
            animateParticles();

            setTimeout(() => { particles.forEach(p => p.gathering = true); }, 2500);
            setTimeout(() => { document.getElementById('textOverlay').style.opacity = '1'; }, 4000);
            setTimeout(goToSphere, 7500);
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                if (!p.gathering) {
                    p.x += p.speedX; p.y += p.speedY;
                    if (p.x < 0 || p.x > canvas.width) p.speedX *= -1;
                    if (p.y < 0 || p.y > canvas.height) p.speedY *= -1;
                } else {
                    p.x += (p.originX - p.x) * 0.05;
                    p.y += (p.originY - p.y) * 0.05;
                }
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.fill();
            });
            requestAnimationFrame(animateParticles);
        }

        /* --- HIỆU ỨNG GÕ CHỮ MÀN HÌNH 4 --- */
        const contentMessage = `Chúc bạn nhỏ của tui mau ăn chóng lớn và ngoan ngoãn nhé. Luôn vui vẻ, nở nụ cười trên môi và đặc biệt là không được tiêu cực ạ.\n\nChúc bạn nhỏ ngày càng xinh xắn, dễ thương, mong bạn có tất cả cả vũ trụ va vào.\n\nThương bạn nhỏ của tui nhiều lắm... ❤️`;
        let textIndex = 0;

        function startTyping() {
            const typingElement = document.getElementById('typingText');
            if (textIndex < contentMessage.length) {
                typingElement.innerHTML += contentMessage.charAt(textIndex);
                textIndex++;
                setTimeout(startTyping, 50);
            }
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
